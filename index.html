<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Baltimore ZIP Choropleth</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

  <!-- Mapbox CSS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      padding: 0;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    .tooltip {
      position: absolute;
      background: white;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 14px;
      pointer-events: none;
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.3);
      display: none;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <div id="tooltip" class="tooltip"></div>

  <!-- Mapbox JS -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

  <script>
    // Your restricted public token goes here
    mapboxgl.accessToken = 'pk.eyJ1IjoidGhlc2tpbm55bWFuIiwiYSI6ImNtcjhoamdxODFtMG0zNXB3MmtkMDJ1ODIifQ.sGSlpFmTNU8UTIm1eYo2HA';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/light-v11',
      center: [-76.6122, 39.2904], // Baltimore
      zoom: 10.5
    });

    map.on('load', async () => {

      // Load ZIP polygons
      const zipGeoJSON = await fetch('data/baltimore_zips.geojson').then(r => r.json());

      // Load naloxone totals
      const totals = await fetch('data/naloxone_totals.json').then(r => r.json());

      // Inject totals into each ZIP feature
      zipGeoJSON.features.forEach(f => {
        const zip = f.properties.ZIPCODE1;
        f.properties.naloxone_total = totals[zip] ?? 0;
      });

      // Load your GeoJSON from GitHub Pages
      map.addSource('baltimore-zips', {
        type: 'geojson',
        data: 'data/baltimore_zips.geojson'
      });

      // Choropleth color scale
      map.addLayer({
        id: 'zip-fill',
        type: 'fill',
        source: 'baltimore-zips',
        paint: {
          'fill-color': [
            'interpolate',
            ['linear'],
            ['get', 'naloxone_total'],
            0, '#f7fbff',
            100, '#c6dbef',
            500, '#6baed6',
            1000, '#2171b5',
            2000, '#08306b'
          ],
          'fill-opacity': 0.65
        }
      });

      // Outline layer
      map.addLayer({
        id: 'zip-outline',
        type: 'line',
        source: 'baltimore-zips',
        paint: {
          'line-color': '#333',
          'line-width': 1
        }
      });

      // Tooltip logic
      const tooltip = document.getElementById('tooltip');

      map.on('mousemove', 'zip-fill', (e) => {
        if (!e.features.length) return;

        const feature = e.features[0];
        const zip = feature.properties.ZIPCODE1;
        const total = f.properties.naloxone_total;

        tooltip.style.display = 'block';
        tooltip.style.left = (e.point.x + 10) + 'px';
        tooltip.style.top = (e.point.y + 10) + 'px';
        tooltip.innerHTML = `ZIP: ${zip}<br>Naloxone: ${total}`;
      });

      map.on('mouseleave', 'zip-fill', () => {
        tooltip.style.display = 'none';
      });
    });
  </script>
</body>

</html>
